<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#0d0714">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Violet">
  <title>Violet Status</title>
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="icons/icon-180.png">
  <link rel="icon" type="image/png" href="icons/icon-192.png">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- atmosphere -->
  <div class="aurora" aria-hidden="true">
    <div class="blob b1"></div>
    <div class="blob b2"></div>
    <div class="blob b3"></div>
  </div>
  <div class="stars" aria-hidden="true"></div>

  <!-- Lock screen -->
  <div id="lockScreen" class="lock" hidden>
    <form id="lockForm" class="lock-card">
      <img src="icons/icon-192.png" alt="" class="lock-icon">
      <h1>Violet Status</h1>
      <p class="lock-sub">one tap to mum 💜</p>
      <input id="passwordInput" type="password" placeholder="Password"
             autocomplete="current-password" autocapitalize="off" autocorrect="off"
             enterkeyhint="go">
      <button type="submit" class="btn-primary">Unlock</button>
      <p id="lockError" class="error" role="alert"></p>
    </form>
  </div>

  <!-- App -->
  <main id="appScreen" hidden>
    <header class="app-header">
      <h1>💜 Violet Status</h1>
      <button id="lockBtn" type="button" class="btn-ghost">Lock</button>
    </header>

    <section id="notifSection" class="notif-section" hidden>
      <button id="enableNotifBtn" type="button" class="btn-notif">🔔 Enable notifications on this device</button>
      <p id="notifState" class="notif-state"></p>
      <button id="muteBtn" type="button" class="btn-mute" hidden>🔕 Mute this device</button>
    </section>

    <section>
      <h2><span class="step-num">1</span> Pick a status</h2>
      <div id="statusGrid" class="status-grid" role="radiogroup" aria-label="Status"></div>
      <form id="addForm" class="add-form">
        <input id="newStatusInput" type="text" placeholder="Add your own… e.g. 🍼 Feeding" maxlength="60">
        <button type="submit" class="btn-add">Add</button>
      </form>
    </section>

    <section>
      <h2><span class="step-num">2</span> Send it</h2>
      <button id="notifyBtn" type="button" class="btn-notify" disabled>Pick a status first</button>
    </section>

    <section>
      <h2>Recently sent</h2>
      <ul id="historyList" class="history"></ul>
    </section>
  </main>

  <div id="toast" role="status"></div>

  <script src="sha256.js"></script>
  <script src="/api/client-config"></script>
  <script src="app.js"></script>
</body>
</html>
